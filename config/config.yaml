default_model: gigaam-v3

models:
  gigaam-v3:
    backend: gigaam
    variant: v3_rnnt       # самый точный для русского
    device: cuda
    longform_threshold_sec: 30
    preload: true          # держать веса в VRAM с момента старта

  whisper-large-v3:
    backend: faster_whisper
    model_name: large-v3
    device: cuda
    # Pascal mining cards (P104-100, sm_61) refuse both float16 and
    # int8_float16 in CTranslate2 4.x. int8 with float32 activations
    # is the fastest option that actually loads on this GPU.
    compute_type: int8
    beam_size: 5
    preload: true

  gpt-4o-transcribe:
    backend: openai
    model_name: gpt-4o-transcribe

server:
  max_upload_mb: 100
  request_timeout_sec: 600
