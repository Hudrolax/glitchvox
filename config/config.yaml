default_model: gigaam-v3

models:
  gigaam-v3:
    backend: gigaam
    variant: v3_rnnt       # самый точный для русского
    device: cuda
    longform_threshold_sec: 30

  whisper-large-v3:
    backend: faster_whisper
    model_name: large-v3
    device: cuda
    # Pascal GPUs (sm_61, e.g. P104-100) don't have tensor cores, so plain
    # float16 is refused by CTranslate2. int8_float16 weights + fp16 activations
    # is the canonical Pascal-friendly setting.
    compute_type: int8_float16
    beam_size: 5

  gpt-4o-transcribe:
    backend: openai
    model_name: gpt-4o-transcribe

server:
  max_upload_mb: 100
  request_timeout_sec: 600
