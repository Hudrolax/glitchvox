services:
  glitchvox:
    build: .
    image: glitchvox:latest
    container_name: glitchvox
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CONFIG_PATH: /app/config/config.yaml
    volumes:
      - ./config:/app/config:ro
      - ./models_cache:/models_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
